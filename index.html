/* ═══════════════════════════════════════
   REFERENCE MANUAL (from docx content)
   ═══════════════════════════════════════ */
function ReferenceManual(){
  return(
  <div style={{maxWidth:680,margin:"0 auto",padding:"16px 12px 80px"}}>
    {/* Title bar */}
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"#8B0000",marginBottom:4}}>UNCLASSIFIED</div>
      <h1 style={{fontSize:20,fontWeight:800,color:"#2D4A22",margin:"0 0 4px"}}>MILITARY MAP READING</h1>
      <h2 style={{fontSize:14,fontWeight:600,color:"#555",margin:0}}>Comprehensive Reference Manual</h2>
      <div style={{width:50,height:3,background:"#2D4A22",borderRadius:2,margin:"10px auto 0"}}/>
    </div>

    {/* ── SECTION 1 ── */}
    <Section title="1. Introduction to Military Map Reading" defaultOpen={true}>
      <p>Map reading is one of the most fundamental military skills. Every soldier, from the newest recruit to the most experienced sniper, must be competent in using a map to navigate terrain, plan operations, and communicate locations accurately.</p>
      <p>This reference covers topographic map fundamentals, grid reference systems, terrain association, compass use, military sketching, range cards, and field-expedient navigation. It integrates sniper-level recording, observation, and terrain analysis techniques.</p>

      <div className="sub">Purpose of Military Maps</div>
      <p>A military map is a graphic representation of a portion of the earth's surface, drawn to scale as seen from above. It provides critical information about terrain, elevation, natural and man-made features, and distances between points. Military maps are essential for planning and conducting troop movements, calling for and adjusting indirect fire, communicating locations, route selection during infiltration, and recording and reporting intelligence information.</p>

      <div className="callout">
        <div className="callout-title">Sniper Application</div>
        Navigation is a core selection criterion for sniper candidates. Soldiers must display competence as individual navigators before receiving sniper training. During missions, the team establishes a primary azimuth on insertion and immediately begins information collection and map updates. Maps are used alongside aerial photographs to plan tentative firing positions, routes, and rally points.
      </div>

      <div className="sub">Types of Military Maps</div>
      <table><thead><tr><th>Type</th><th>Description</th></tr></thead><tbody>
        <tr><td><strong>Topographic</strong></td><td>Shows terrain relief using contour lines, elevation tints, and conventional symbols. The primary map for land navigation and tactical planning.</td></tr>
        <tr><td><strong>Planimetric</strong></td><td>Shows horizontal positions of features without relief. Useful for urban operations and infrastructure analysis.</td></tr>
        <tr><td><strong>Photomap</strong></td><td>Aerial photograph overprinted with grid lines, marginal data, and place names. Used when standard topographic maps are unavailable.</td></tr>
        <tr><td><strong>Joint Ops Graphic</strong></td><td>Medium-scale map for joint/combined operations planning across services and allied forces.</td></tr>
        <tr><td><strong>Terrain Model</strong></td><td>Three-dimensional representation for briefings, rehearsals, and mission planning.</td></tr>
      </tbody></table>
    </Section>

    {/* ── SECTION 2 ── */}
    <Section title="2. Reading a Topographic Map">
      <div className="sub">Marginal Information</div>
      <p>Before using any map, review its marginal information. This data tells you everything needed to correctly interpret the map: Sheet Name and Number (identifies the map sheet), Series and Edition (how current the data is), Scale (ratio of map to ground distance), Contour Interval (vertical distance between contour lines), Grid Reference Box (instructions for determining coordinates), Legend (symbols and their meanings), Declination Diagram (relationship between true, grid, and magnetic north), and Bar Scales (graphic rulers for measuring distances).</p>

      <div className="sub">Map Scale</div>
      <p>Scale is the relationship between distance on a map and corresponding distance on the ground. Understanding scale is critical for calculating distances and planning movements.</p>
      <table><thead><tr><th>Scale</th><th>1 cm =</th><th>Grid Sq on Paper</th><th>Use</th></tr></thead><tbody>
        <tr><td>1:25,000</td><td>250 m</td><td>40 mm</td><td>Detailed tactical ops, patrol planning</td></tr>
        <tr><td>1:50,000</td><td>500 m</td><td>20 mm</td><td>Standard military operations</td></tr>
        <tr><td>1:100,000</td><td>1 km</td><td>10 mm</td><td>Operational planning, vehicle movement</td></tr>
        <tr><td>1:250,000</td><td>2.5 km</td><td>4 mm *</td><td>Strategic planning, air ops</td></tr>
      </tbody></table>
      <p style={{fontSize:11,color:"#888",fontStyle:"italic"}}>* At 1:250,000, grid lines are printed at 10 km intervals, not 1 km. A 1 km subdivision is only 4 mm — manual precision beyond a 4-figure grid is unreliable.</p>

      <div className="sub">Contour Lines and Terrain Features</div>
      <p>Contour lines connect points of equal elevation. By interpreting contour patterns, a soldier can determine the shape, slope, and relief of terrain without visiting the area.</p>

      <p><strong>Five Major Terrain Features:</strong></p>
      <p><strong>Hill</strong> — elevation dropping in all directions, shown by concentric closed contour lines. <strong>Ridge</strong> — a line of high ground with steep slope on one or both sides, shown by elongated contour lines. <strong>Valley</strong> — low ground between two ridges, shown by U or V-shaped contour lines with closed ends pointing upstream. <strong>Saddle</strong> — low ground between two high areas, resembling an hourglass in contour lines. <strong>Depression</strong> — low point surrounded by higher ground, shown by closed contours with tick marks pointing inward.</p>

      <p><strong>Three Minor Terrain Features:</strong></p>
      <p><strong>Draw</strong> — a less-developed valley where contours form a U pointing away from high ground. <strong>Spur</strong> — a short ridge extending from a hill where contours form a U pointing away from low ground. <strong>Cliff</strong> — a vertical change where contour lines merge or touch.</p>

      <p><strong>Two Supplementary Features:</strong></p>
      <p><strong>Cut</strong> — man-made excavation (roads through hills). <strong>Fill</strong> — man-made raised ground.</p>

      <div className="callout">
        <div className="callout-title">Sniper Application — Terrain and Observation</div>
        Snipers divide their observation area into foreground, middle ground, and distant/far ground. Each zone is scanned systematically using short, overlapping eye movements. Terrain features identified on the map directly inform hide position selection, fields of fire, and dead ground analysis.
      </div>
    </Section>

    {/* ── SECTION 3 ── */}
    <Section title="3. Military Grid Reference System">
      <p>The Military Grid Reference System (MGRS) provides a standardised way to identify any point on the earth's surface. It is the primary coordinate system used by NATO and allied forces for ground operations.</p>

      <div className="sub">Grid Lines</div>
      <p>Grid lines are the vertical (eastings) and horizontal (northings) lines printed on a military map. Eastings increase left to right; northings increase bottom to top. The grid squares they form are the foundation for all coordinate reporting.</p>

      <div className="sub">4-Figure Grid Reference</div>
      <p>A 4-figure grid reference identifies a 1 km grid square. Read RIGHT to find the easting line to the LEFT of the target, then read UP to find the northing line BELOW the target. Combine them: easting first, then northing.</p>
      <div className="callout warn">
        <div className="callout-title">Memory Aid</div>
        "Along the corridor, up the stairs" — always give the easting (horizontal) before the northing (vertical).
      </div>

      <div className="sub">6-Figure Grid Reference</div>
      <p>A 6-figure grid reference pinpoints a location to within 100 meters. After finding the easting and northing grid lines, estimate tenths within the grid square to add a third digit to each. For example, easting 68 plus 5 tenths = 685, northing 43 plus 7 tenths = 437, giving a 6-figure reference of 685437.</p>

      <div className="sub">8 and 10-Figure Grid References</div>
      <p>For greater precision, 8-figure references (10 m) and 10-figure references (1 m) are used. These typically require a GPS device or map protractor/romer. Sniper teams routinely use GPS and laser range finders to establish precise grid coordinates.</p>

      <div className="sub">Grid Precision by Map Scale</div>
      <table><thead><tr><th>Scale</th><th>Grid Sq Size</th><th>Best Manual</th><th>Best with GPS</th></tr></thead><tbody>
        <tr><td>1:25,000</td><td>40 mm (1 km)</td><td>8-digit (10 m)</td><td>10-digit (1 m)</td></tr>
        <tr><td>1:50,000</td><td>20 mm (1 km)</td><td>8-digit (10 m)</td><td>10-digit (1 m)</td></tr>
        <tr><td>1:100,000</td><td>10 mm (1 km)</td><td>6-digit (100 m)</td><td>8-digit (10 m)</td></tr>
        <tr><td>1:250,000</td><td>4 mm (10 km)*</td><td>4-digit (10 km)</td><td>6-digit (1 km)</td></tr>
      </tbody></table>
      <p style={{fontSize:11,color:"#888",fontStyle:"italic"}}>* Grid lines at 1:250,000 are 10 km apart. A 10-digit grid is physically impossible to derive manually from any map — it always requires GPS.</p>

      <div className="callout">
        <div className="callout-title">Sniper Application — Grid Coordinates in Recording</div>
        Grid coordinates are recorded on range cards, military sketches, and observation logs. Every panoramic and topographic sketch must include the grid coordinates of the team's position. Every event in the observation record includes grid coordinates. Accurate referencing is essential for calling indirect fire and intelligence reporting.
      </div>
    </Section>

    {/* ── SECTION 4 ── */}
    <Section title="4. Compass Use and Land Navigation">
      <div className="sub">The Lensatic Compass</div>
      <p>The lensatic compass consists of a cover with a sighting wire, a floating dial with a luminous arrow, a lens for reading bearings, and a bezel ring for tracking direction changes. It measures direction in degrees (0–360) or mils (0–6400 NATO).</p>

      <div className="sub">Magnetic Azimuth</div>
      <p>An azimuth is a horizontal angle measured clockwise from a north reference line. In military navigation, azimuths are measured from magnetic north using a compass. To convert between grid azimuths (from the map) and magnetic azimuths (from the compass), the declination diagram must be consulted.</p>

      <div className="sub">Converting Between Grid and Magnetic</div>
      <p>The G-M angle (grid-magnetic angle) is found on the declination diagram. In Abu Dhabi, the declination is approximately 39 mils (2.19°) East. When converting grid to magnetic with an East G-M angle, subtract. When converting magnetic to grid, add.</p>

      <div className="callout warn">
        <div className="callout-title">Common Error</div>
        Getting the G-M conversion backwards is the single most common navigation error. It doubles the angular error (78 mils instead of zero) and can put you hundreds of metres off target. Always verify: Abu Dhabi (East) = Grid to Mag SUBTRACT, Mag to Grid ADD.
      </div>

      <div className="sub">Navigating with Map and Compass</div>
      <p>The basic procedure is: orient the map using the compass (accounting for declination), determine your current position, identify the destination, measure the grid azimuth with a protractor, convert to magnetic, set the compass, and begin movement using pace count and terrain association to confirm progress.</p>

      <div className="sub">Route Selection</div>
      <p>Factors include enemy locations and detection devices, terrain and natural obstacles, weather and visibility, man-made obstacles, available cover and concealment, and dead ground that could mask movement.</p>

      <div className="callout">
        <div className="callout-title">Sniper Application — Route Selection</div>
        The sniper team selects primary and alternate routes during mission planning using maps and aerial photographs. En route, checkpoints are selected to track progress. The team moves on routes that best conceal movement from enemy observation. Night-aiming and night-vision equipment are used during reduced visibility. The team's land navigation skills allow rapid traversal of rugged terrain while avoiding detection.
      </div>
    </Section>

    {/* ── SECTION 5 ── */}
    <Section title="5. Range Estimation and Distance">
      <div className="sub">Map-Based Distance</div>
      <p>When prominent features exist, an up-to-date map can accurately calculate ranges between objects. This is one of the most reliable tools available and should always be cross-referenced against other methods.</p>

      <div className="sub">100-Meter-Unit-of-Measure Method</div>
      <p>Visualise 100 m increments on the ground. For ranges up to 500 m, count units to the target. Beyond 500 m, pick a halfway point, count to it, and double. Not very accurate beyond 400 m.</p>

      <div className="sub">Appearance-of-Object Method</div>
      <table><thead><tr><th>Range</th><th>Appearance</th></tr></thead><tbody>
        <tr><td>100 m</td><td>Clear in all detail</td></tr>
        <tr><td>200 m</td><td>Clear detail, skin colour and equipment identifiable</td></tr>
        <tr><td>300 m</td><td>Clear body outline, face colour good, remaining detail blurred</td></tr>
        <tr><td>400 m</td><td>Body outline clear, remaining detail blurred</td></tr>
        <tr><td>500 m</td><td>Body begins to taper, head becomes indistinct</td></tr>
        <tr><td>600 m</td><td>Body wedge-shaped, no head apparent</td></tr>
      </tbody></table>

      <div className="sub">Factors Affecting Range Estimation</div>
      <p><strong>Target:</strong> Regular outlines appear closer. Contrasting targets appear closer. Partly exposed targets appear farther. <strong>Terrain:</strong> Following contours causes overestimation. Smooth surfaces (sand, water, snow) cause underestimation. Downhill = appears farther. Uphill = appears closer. Dead ground = appears closer. <strong>Light:</strong> Clearly visible targets appear closer. Sun behind observer = closer. Sun behind target = farther.</p>

      <div className="sub">Tools for Calculating Ranges</div>
      <p><strong>Laser Range Finders</strong> provide highly accurate range and should always be used when available. <strong>GPS Systems</strong> provide reliable distance between two known points. <strong>Maps</strong> accurately calculate ranges when prominent features exist. <strong>Mil-Relation Formula</strong> uses the mil-scale reticle in binoculars or scopes: known size of target (mm) divided by mil-scale reading = range (m). Remember: 1 mil = 1 metre at 1,000 metres.</p>
    </Section>

    {/* ── SECTION 6 ── */}
    <Section title="6. Military Sketches and Range Cards">
      <div className="sub">The Range Card</div>
      <p>The range card represents the target area drawn as seen from above, with distance annotations throughout. It provides a quick-range reference using pre-printed range rings. Sectors can be created using dashed lines for rapid target location.</p>
      <p>Information includes: name/rank/unit, method of obtaining range, left and right limits of engagement area, major terrain features/roads/structures, ranges/elevation/windage at various distances, temperature and wind (previous entries crossed out when conditions change), and target reference points (azimuth, distance, description).</p>

      <div className="sub">The Military Sketch</div>
      <p>Military sketches record information about areas, terrain features, or structures not shown on standard maps. They provide intelligence cells with detailed ground-level views otherwise unobtainable.</p>

      <p><strong>Panoramic Sketch</strong> — drawn to scale as seen from the team's perspective. Shows detail about a specific area or structure. Required information: grid coordinates of position, weather, magnetic azimuth through centre, sketch number, scale, date and time.</p>

      <p><strong>Topographic Sketch</strong> — drawn to scale as seen from above. Useful for describing road systems, stream flow, and obstacle locations. Can be used as an overlay on the range card.</p>

      <div className="sub">Guidelines for Drawing Sketches</div>
      <p><strong>Work whole to part:</strong> establish boundaries first, then large objects (hills, buildings), then smaller details. <strong>Use common shapes:</strong> don't draw every individual tree — use representative shapes unless tactically important. <strong>Draw in perspective:</strong> use vanishing points. Parallel lines receding from the observer converge at vanishing points on, above, or below the horizon depending on slope.</p>

      <div className="callout">
        <div className="callout-title">Technology Note</div>
        Digital images on laptops, tablets, or other devices can supplement hand-drawn sketches. However, due to limited reliability of technology and dependence on battery power, snipers must retain the ability to produce manual hand-sketched military drawings. In some cases, a hand-drawn sketch provides more detail and clarity than a photograph.
      </div>

      <div className="sub">The Observation Log</div>
      <p>A chronological record of all activities and events in the team's area. Used alongside sketches and range cards, it provides commanders with both the appearance of the area and an accurate activity record. Information includes: sheet number, observer identification, date/time/visibility, grid coordinates, series number, event descriptions, and actions taken.</p>
    </Section>

    {/* ── SECTION 7 ── */}
    <Section title="7. Practical Exercises">
      <div className="sub">Exercise 1: Map Familiarisation</div>
      <p><strong>Objective:</strong> Correctly identify all marginal information on a 1:50,000 topographic map. <strong>Task:</strong> Students receive a map sheet and must identify and record sheet name/number, scale, contour interval, declination diagram details, legend symbols, and grid reference system. <strong>Standard:</strong> Correctly identify all marginal data within 10 minutes.</p>

      <div className="sub">Exercise 2: Grid References</div>
      <p><strong>Objective:</strong> Determine 4 and 6-figure grid references for given points. <strong>Task:</strong> Using a map and romer/protractor, determine grid references for 10 designated points. Then, given 10 grid references, plot the corresponding locations. <strong>Standard:</strong> 90% accuracy. All 6-figure references within one grid subdivision (100 m) of the correct answer.</p>

      <div className="sub">Exercise 3: Terrain Association</div>
      <p><strong>Objective:</strong> Identify the five major and three minor terrain features on both map and ground. <strong>Task:</strong> From a vantage point, correlate visible terrain features with their map representation, identifying each by name and marking it on the map. <strong>Standard:</strong> Correctly identify and label all terrain features within the designated training area.</p>

      <div className="sub">Exercise 4: Compass Navigation</div>
      <p><strong>Objective:</strong> Navigate a compass course of at least 4 legs, arriving within 100 m of each checkpoint. <strong>Task:</strong> Plan a route using map, protractor, and compass. Convert grid azimuths to magnetic, calculate distances, determine pace counts, and navigate the course. <strong>Standard:</strong> Arrive within 100 m of each checkpoint. Complete within allocated time.</p>

      <div className="sub">Exercise 5: Range Card and Military Sketch</div>
      <p><strong>Objective:</strong> Produce a range card and panoramic sketch from an assigned position. <strong>Task:</strong> Prepare a range card with sector divisions, distance annotations, and target reference points. Produce a panoramic sketch with all required information annotated. <strong>Standard:</strong> Products must include all mandatory data fields and accurately represent the observed area. Distances within 10% of actual.</p>
    </Section>

    {/* ── SECTION 8 ── */}
    <Section title="8. Key Principles and Summary">
      <table><thead><tr><th>Principle</th><th>Application</th></tr></thead><tbody>
        <tr><td><strong>Accuracy First</strong></td><td>A wrong grid reference can result in fratricide, missed linkups, or misdirected fires. Double-check all coordinates.</td></tr>
        <tr><td><strong>Combination Methods</strong></td><td>In combat, perfect conditions rarely exist. Use two or more methods of range estimation and navigation to arrive at the best answer.</td></tr>
        <tr><td><strong>Maintain Skills</strong></td><td>Technology can fail. Retain manual skills for compass navigation, hand-drawn sketches, and visual range estimation even when digital tools are available.</td></tr>
        <tr><td><strong>Terrain Association</strong></td><td>Constantly compare the map to the ground. Use prominent terrain features as checkpoints and confirm position at every opportunity.</td></tr>
        <tr><td><strong>Security</strong></td><td>Protect maps and sketches. They contain information about friendly positions, planned routes, and intelligence value. Destroy or sanitise before risk of capture.</td></tr>
        <tr><td><strong>Record Everything</strong></td><td>Range cards, sketches, and observation logs create an institutional record vital for follow-on forces and intelligence analysis.</td></tr>
      </tbody></table>

      <div className="callout">
        <div className="callout-title">Final Note</div>
        The map is the soldier's window into terrain he has not yet walked. Master this skill, and it will serve you in every operation, every environment, and every mission you undertake.
      </div>
    </Section>
  </div>);
}

function pToGR(px,py){const e=P_E0+px/P_CELL,n=P_N0+(P_MAP-py)/P_CELL;return{ref:String(Math.floor(e)).padStart(2,"0")+Math.floor((e-Math.floor(e))*10)+String(Math.floor(n)).padStart(2,"0")+Math.floor((n-Math.floor(n))*10),easting:e,northing:n};}
function pBrg(ax,ay,bx,by){let a=Math.atan2(bx-ax,-(by-ay))*180/Math.PI;if(a<0)a+=360;return a;}
function pDist(ax,ay,bx,by){const dx=(bx-ax)/P_CELL,dy=(by-ay)/P_CELL;return Math.sqrt(dx*dx+dy*dy);}

          <circle cx={l.x} cy={l.y} r={10} fill={ided[i]?l.color:"#ddd"} stroke="#fff" strokeWidth={2}/><text x={l.x} y={l.y+1} textAnchor="middle" dominantBaseline="central" fontSize={10} fill="#fff" fontWeight={800}>{l.id}</text><text x={l.x+14} y={l.y-6} fontSize={8} fontWeight={700} fill={l.color}>{l.name}</text></g>)}
        {sL&&LM.map((l,i)=>{const rad=(bD[i]-90)*Math.PI/180;return<line key={"bl"+i} x1={l.x} y1={l.y} x2={l.x+800*Math.cos(rad)} y2={l.y+800*Math.sin(rad)} stroke={l.color} strokeWidth={1.5} strokeDasharray="6,4" opacity={.7}/>;})}
        {sF&&<g className="fade-in">{fp.length>=3&&<polygon points={fp.map(p=>p.x+","+p.y).join(" ")} fill="#FFD70033" stroke="#FFD700" strokeWidth={1.5}/>}<circle cx={fc.x} cy={fc.y} r={8} fill="none" stroke="#FF4500" strokeWidth={2.5}/><line x1={fc.x-12} y1={fc.y} x2={fc.x+12} y2={fc.y} stroke="#FF4500" strokeWidth={1.5}/><line x1={fc.x} y1={fc.y-12} x2={fc.x} y2={fc.y+12} stroke="#FF4500" strokeWidth={1.5}/><text x={fc.x+14} y={fc.y-10} fontSize={10} fontWeight={800} fill="#FF4500" className="mono">YOU</text><text x={fc.x+14} y={fc.y+4} fontSize={8} fill="#FF4500" className="mono">{fGR}</text></g>}
      </svg>
    </div>
    {cs.action==="identify"&&<div className="fade-in" style={{background:"#fff",borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 2px 8px #0001"}}><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Tap each landmark on the map:</div>{LM.map((l,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<2?"1px solid #f0f0f0":"none"}}><div style={{width:24,height:24,borderRadius:"50%",background:ided[i]?l.color:"#ddd",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:800}}>{l.id}</div><div style={{flex:1,fontSize:13,color:ided[i]?"#333":"#999"}}>{l.name}</div><div className="mono" style={{fontSize:11,fontWeight:700,color:ided[i]?"#2D6A4F":"#ccc"}}>{ided[i]?"\u2713":"..."}</div></div>)}</div>}
    {cs.action==="shoot"&&<div className="fade-in" style={{background:"#fff",borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 2px 8px #0001"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}><div style={{width:32,height:32,borderRadius:"50%",background:LM[cs.target].color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:800}}>{LM[cs.target].id}</div><div><div style={{fontSize:14,fontWeight:700}}>{LM[cs.target].name}</div></div></div>
      {brgs[cs.target]===null?<button onClick={()=>{const n=[...brgs];n[cs.target]=mM[cs.target];setBrgs(n);}} style={{width:"100%",padding:14,background:LM[cs.target].color,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>{"\uD83E\uDDED"} Shoot Bearing</button>
      :<div style={{background:"#F0FFF0",borderRadius:10,padding:14,textAlign:"center"}}><div style={{fontSize:10,fontWeight:700,color:"#2D6A4F",textTransform:"uppercase"}}>Magnetic Bearing</div><div className="mono" style={{fontSize:28,fontWeight:800,marginTop:4}}>{Math.round(brgs[cs.target])} <span style={{fontSize:14}}>mils</span></div><div style={{fontSize:11,color:"#888"}}>({mD[cs.target].toFixed(1)}{"\u00b0"})</div></div>}
    </div>}
    {(sC||sB)&&<div className="fade-in" style={{background:"#fff",borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 2px 8px #0001"}}><h3 style={{fontSize:13,fontWeight:800,color:"#2D4A22",margin:"0 0 10px"}}>Bearing Table</h3><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}><thead><tr style={{background:"#2D4A22",color:"#fff"}}><th style={{padding:"8px 6px",textAlign:"left"}}>Pt</th><th style={{padding:"8px 6px",textAlign:"center"}}>Mag</th>{sC&&<th style={{padding:"8px 6px",textAlign:"center"}}>Grid</th>}{sB&&<th style={{padding:"8px 6px",textAlign:"center"}}>Back</th>}</tr></thead><tbody>{LM.map((l,i)=><tr key={i} style={{background:i%2===0?"#f8f8f8":"#fff"}}><td style={{padding:"8px 6px",fontWeight:700,color:l.color}}>{l.id}</td><td className="mono" style={{padding:"8px 6px",textAlign:"center"}}>{Math.round(mM[i])}</td>{sC&&<td className="mono" style={{padding:"8px 6px",textAlign:"center",fontWeight:700}}>{Math.round(gM[i])}</td>}{sB&&<td className="mono" style={{padding:"8px 6px",textAlign:"center",fontWeight:700,color:"#8B0000"}}>{Math.round(bM[i])}</td>}</tr>)}</tbody></table></div></div>}
    {sF&&<div className="fade-in" style={{background:"linear-gradient(135deg,#FF4500,#CC3700)",borderRadius:12,padding:16,marginBottom:12,color:"#fff",textAlign:"center"}}><div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",opacity:.8}}>Position Fix</div><div className="mono" style={{fontSize:32,fontWeight:800,marginTop:6}}>{fGR}</div></div>}
    {cs.action==="summary"&&<div className="fade-in" style={{background:"#fff",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 2px 8px #0001"}}><h3 style={{fontSize:14,fontWeight:800,color:"#2D4A22",margin:"0 0 10px"}}>Quick Reference</h3>{["1. IDENTIFY 3 features.","2. SHOOT magnetic bearings.","3. CONVERT mag\u2192grid (+39 mils).","4. BACK-BEARINGS (\u00b13200 mils).","5. PLOT from each landmark.","6. READ position at cocked hat centre.","","Tips: Spread features ~2133 mils apart. Cocked hat > 1 grid sq = re-shoot. Always use 3 bearings, not 2."].map((t,i)=>t?<div key={i} style={{fontSize:12,lineHeight:1.55,padding:"6px 0",borderBottom:i<5?"1px solid #f0f0f0":"none"}}>{t}</div>:null)}</div>}
    <div style={{display:"flex",gap:8,paddingBottom:12}}>{step>0&&<button onClick={()=>setStep(s=>Math.max(0,s-1))} style={{flex:1,padding:14,background:"#fff",color:"#2D4A22",border:"2px solid #2D4A22",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>{"\u2190"}</button>}{step<R_STEPS.length-1?<button onClick={()=>ok()&&setStep(s=>s+1)} disabled={!ok()} style={{flex:2,padding:14,background:ok()?"#2D4A22":"#ccc",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:ok()?"pointer":"not-allowed"}}>{cs.action==="identify"&&!ided.every(Boolean)?"Tap landmarks":cs.action==="shoot"&&brgs[cs.target]===null?"Shoot bearing":"Next \u2192"}</button>:<button onClick={reset} style={{flex:2,padding:14,background:"#8B0000",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>Reset</button>}</div>
  </div>);
}


/* ═══════════════════════════════════════
   LESSON MENU
   ═══════════════════════════════════════ */
function LessonMenu({onSelect}){
  return(<div style={{maxWidth:680,margin:"0 auto",padding:"24px 16px 80px"}}>
    <div style={{textAlign:"center",marginBottom:28}}><div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"#8B7355",marginBottom:6}}>INTERACTIVE TRAINING</div><h1 style={{fontSize:22,fontWeight:800,color:"#2D4A22",margin:"0 0 4px"}}>GUIDED LESSONS</h1><div style={{width:50,height:3,background:"#2D4A22",borderRadius:2,margin:"10px auto 0"}}/></div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <button onClick={()=>onSelect("prot")} style={{background:"#fff",border:"2px solid #2D4A2222",borderRadius:16,padding:18,cursor:"pointer",textAlign:"left",boxShadow:"0 2px 10px #0001",display:"flex",gap:14,alignItems:"center"}}><div style={{width:50,height:50,borderRadius:12,background:"linear-gradient(135deg,#2D4A22,#1B4332)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:24}}>{"\uD83E\uDDED"}</div><div><div style={{fontSize:10,fontWeight:700,color:"#8B7355",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Lesson 1</div><div style={{fontSize:15,fontWeight:800,color:"#2D4A22",marginBottom:3}}>Protractor Plotting</div><div style={{fontSize:12,color:"#666",lineHeight:1.4}}>Plot grid refs, measure bearings, calculate distance, G-M conversion. 7 steps.</div></div></button>
      <button onClick={()=>onSelect("res")} style={{background:"#fff",border:"2px solid #2D4A2222",borderRadius:16,padding:18,cursor:"pointer",textAlign:"left",boxShadow:"0 2px 10px #0001",display:"flex",gap:14,alignItems:"center"}}><div style={{width:50,height:50,borderRadius:12,background:"linear-gradient(135deg,#CC3700,#8B0000)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:24}}>{"\uD83D\uDCCD"}</div><div><div style={{fontSize:10,fontWeight:700,color:"#8B7355",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Lesson 2</div><div style={{fontSize:15,fontWeight:800,color:"#CC3700",marginBottom:3}}>Resection (3-Point Fix)</div><div style={{fontSize:12,color:"#666",lineHeight:1.4}}>Find your position using compass bearings to 3 known landmarks. 10 steps.</div></div></button>
    </div>
    <div style={{marginTop:24,textAlign:"center",fontSize:11,color:"#aaa",lineHeight:1.6}}>NATO 6400-mil system {"\u2022"} G-M: Abu Dhabi ~39 mils East<br/>UNCLASSIFIED \u2014 For training use</div>
  </div>);
}


/* ═══════════════════════════════════════
   MAIN APP WITH TAB BAR
   ═══════════════════════════════════════ */
function App(){
  const[tab,setTab]=useState("lessons"); // "lessons" | "reference"
  const[lesson,setLesson]=useState(null); // null | "prot" | "res"

  const switchTab=(t)=>{setTab(t);setLesson(null);window.scrollTo(0,0);};

  return(<div>
    {/* Content area */}
    {tab==="lessons"&&!lesson&&<LessonMenu onSelect={l=>setLesson(l)}/>}
    {tab==="lessons"&&lesson==="prot"&&<div style={{maxWidth:680,margin:"0 auto",padding:"16px 12px 80px"}}><ProtLesson onBack={()=>setLesson(null)}/></div>}
    {tab==="lessons"&&lesson==="res"&&<div style={{maxWidth:680,margin:"0 auto",padding:"16px 12px 80px"}}><ResLesson onBack={()=>setLesson(null)}/></div>}
    {tab==="reference"&&<ReferenceManual/>}

    {/* iOS-style tab bar */}
    <div className="tab-bar">
      <button className={"tab-btn"+(tab==="lessons"?" active":"")} onClick={()=>switchTab("lessons")}>
        <span className="tab-icon">{"\uD83E\uDDED"}</span>
        <span>Lessons</span>
      </button>
      <button className={"tab-btn"+(tab==="reference"?" active":"")} onClick={()=>switchTab("reference")}>
        <span className="tab-icon">{"\uD83D\uDCD6"}</span>
        <span>Reference</span>
      </button>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- Service Worker Registration & Install Banner -->
<script>
// Register service worker for offline caching
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js')
      .then(function(reg) { console.log('SW registered:', reg.scope); })
      .catch(function(err) { console.log('SW failed:', err); });
  });
}

// Smart install banner for iOS
(function() {
  // Don't show if already in standalone mode (added to home screen)
  var isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  // Don't show if already dismissed
  var dismissed = localStorage.getItem('milnav-install-dismissed');
  
  if (!isStandalone && !dismissed) {
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    
    // Wait for page to settle
    setTimeout(function() {
      var banner = document.createElement('div');
      banner.id = 'install-banner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#2D4A22,#1B4332);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;font-family:-apple-system,system-ui,sans-serif;box-shadow:0 2px 12px rgba(0,0,0,0.3);animation:fadeIn .4s ease';
      
      var icon = document.createElement('div');
      icon.style.cssText = 'width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0';
      icon.textContent = '\uD83E\uDDED';
      
      var text = document.createElement('div');
      text.style.cssText = 'flex:1';
      text.innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:2px">Install MilNav</div><div style="font-size:11px;opacity:0.8">' + 
        (isIOS ? 'Tap <span style="font-size:14px">\u2B06</span> Share then <strong>"Add to Home Screen"</strong>' : 'Add to home screen for app-like experience') + 
        '</div>';
      
      var close = document.createElement('button');
      close.style.cssText = 'background:rgba(255,255,255,0.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center';
      close.textContent = '\u2715';
      close.onclick = function() {
        banner.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
        banner.style.transform = 'translateY(-100%)';
        banner.style.opacity = '0';
        setTimeout(function() { banner.remove(); }, 300);
        localStorage.setItem('milnav-install-dismissed', '1');
        // Adjust body padding
        document.body.style.paddingTop = '0';
      };
      
      banner.appendChild(icon);
      banner.appendChild(text);
      banner.appendChild(close);
      document.body.prepend(banner);
      document.body.style.paddingTop = '68px';
    }, 1500); // Show after 1.5s so content loads first
  }
})();
</script>
