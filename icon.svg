<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2D4A22"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#F5F0E6" stroke-width="6" opacity="0.3"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#F5F0E6" stroke-width="2" opacity="0.2"/>
  <!-- Compass cardinal ticks -->
  <line x1="256" y1="60" x2="256" y2="90" stroke="#F5F0E6" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="422" x2="256" y2="452" stroke="#F5F0E6" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="256" x2="90" y2="256" stroke="#F5F0E6" stroke-width="4" stroke-linecap="round"/>
  <line x1="422" y1="256" x2="452" y2="256" stroke="#F5F0E6" stroke-width="4" stroke-linecap="round"/>
  <!-- Intercardinal ticks -->
  <line x1="117" y1="117" x2="138" y2="138" stroke="#F5F0E6" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="395" y1="117" x2="374" y2="138" stroke="#F5F0E6" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="117" y1="395" x2="138" y2="374" stroke="#F5F0E6" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="395" y1="395" x2="374" y2="374" stroke="#F5F0E6" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- North arrow (red) -->
  <polygon points="256,80 232,240 256,220 280,240" fill="#CC0000" opacity="0.9"/>
  <!-- South arrow (cream) -->
  <polygon points="256,432 232,272 256,292 280,272" fill="#F5F0E6" opacity="0.5"/>
  <!-- Centre dot -->
  <circle cx="256" cy="256" r="8" fill="#F5F0E6"/>
  <!-- Grid lines hint -->
  <line x1="170" y1="170" x2="342" y2="170" stroke="#F5F0E6" stroke-width="1" opacity="0.15"/>
  <line x1="170" y1="256" x2="342" y2="256" stroke="#F5F0E6" stroke-width="1" opacity="0.15"/>
  <line x1="170" y1="342" x2="342" y2="342" stroke="#F5F0E6" stroke-width="1" opacity="0.15"/>
  <line x1="170" y1="170" x2="170" y2="342" stroke="#F5F0E6" stroke-width="1" opacity="0.15"/>
  <line x1="256" y1="170" x2="256" y2="342" stroke="#F5F0E6" stroke-width="1" opacity="0.15"/>
  <line x1="342" y1="170" x2="342" y2="342" stroke="#F5F0E6" stroke-width="1" opacity="0.15"/>
  <!-- N label -->
  <text x="256" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" font-weight="900" fill="#CC0000">N</text>
</svg>
